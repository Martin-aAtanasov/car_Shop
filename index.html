<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Store - Product Listing</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="logo">City Car Store</div>
        <nav>
            <button onclick="loadCategory('sedans')">Sedans</button>
            <button onclick="loadCategory('suvs')">SUVs</button>
        </nav>
    </header>
    
    <section class="category-info">
        <h1 id="category-title">Welcome to City Car Store</h1>
        <p id="category-description">Select a category to view our products.</p>
    </section>

    <div class="controls">
        <div class="counter" id="productCounter"></div>
        <select id="sortSelect" onchange="sortCars()">
            <option value="">Sort By</option>
            <option value="az">Name: A to Z</option>
            <option value="za">Name: Z to A</option>
            <option value="low">Price: Low to High</option>
            <option value="high">Price: High to Low</option>
        </select>
    </div>

    <div class="main">
        <aside class="filters">
            <h3>Filter by Color</h3>
            <label><input type="checkbox" value="black" onchange="applyFilters()"> Black</label>
            <label><input type="checkbox" value="white" onchange="applyFilters()"> White</label>
            <label><input type="checkbox" value="red" onchange="applyFilters()"> Red</label>

            <h3>Max Price</h3>
            <input type="range" min="10000" max="100000" value="100000" id="priceRange" oninput="applyFilters()">
            <span id="priceValue">100000</span>
        </aside>

        <section class="products" id="carGrid"></section>
            
    </div>

    <div class="load-more">
        <button onclick="loadMore()">Load More</button>
    </div>

    <footer>
    <p>&copy; 2024 City Car Store. All rights reserved.</p>
    <p>Terms and Conditions</p>
    <p>Privacy Policy</p>
    <p>Contact Us</p>
    </footer>
    
<script src="script.js"></script>
</body>
</html>
